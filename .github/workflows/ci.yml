name: ci

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Rollup ships optional native binaries for multiple platforms.
      # On a clean Linux runner the lockfile from Windows may be missing the
      # linux-x64 optional dep; `npm install` (not ci) resolves that without
      # touching the rest of the lockfile — then we restore the original.
      - name: Install (resolve optional Rollup platform deps)
        run: |
          cp package-lock.json package-lock.json.bak
          npm install --prefer-offline --no-audit --no-fund
          mv package-lock.json.bak package-lock.json

      - name: Type-check
        run: npx --no-install tsc --noEmit || node_modules/.bin/tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Test (unit + integration)
        run: npm test

      - name: Smoke-test server startup
        run: |
          node index.js &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            curl -fsS http://localhost:4000/health && break
            sleep 0.5
          done
          kill $SERVER_PID
