server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ---- SPA routing -------------------------------------------------------
    # All paths that don't match a real file fall back to index.html so that
    # client-side routes (e.g. /machines/1) work on direct navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Security headers --------------------------------------------------
    add_header X-Frame-Options        "DENY"                              always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;

    # ---- Compression -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ---- Cache: hashed assets (Vite appends a content hash) ----------------
    # These files are immutable: they never change without a new hash.
    location ~* \.(js|css|woff2?|ttf|eot|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Cache: HTML entry point -------------------------------------------
    # Never cache index.html so the browser always fetches the latest version.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
